name: Windows App Build

# Cluxo.Windows.App(net8.0-windows, 네이티브)은 windows runner에서만 빌드된다.
# 아직 프로젝트가 없으면(VM에서 생성 전) 트리거되지 않는다 — paths 필터 + 수동 dispatch.
# 설계 T9: 빌드 + (추후) MSIX 패키징 + 코드사이닝.

on:
  push:
    branches: [main]
    paths:
      - 'src/Cluxo.Windows.App/**'
      - 'Cluxo.Windows.sln'
      - '.github/workflows/windows-app.yml'
  workflow_dispatch: {}   # 수동 실행 (프로젝트 생성 후 즉시 검증용)

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Guard — 윈도우 솔루션 존재 확인
        shell: pwsh
        run: |
          if (-not (Test-Path 'Cluxo.Windows.sln')) {
            Write-Host '::notice::Cluxo.Windows.sln 없음 — 네이티브 앱 생성 전. 스킵.'
            exit 0
          }

      - name: Build (Release)
        if: hashFiles('Cluxo.Windows.sln') != ''
        run: dotnet build Cluxo.Windows.sln --configuration Release

      - name: Test (Core, windows에서도 green 확인)
        if: hashFiles('Cluxo.Windows.sln') != ''
        run: dotnet test Cluxo.Windows.sln --configuration Release --no-build

  # ── 배포 퍼블리시 + 코드사이닝 (T9) — 수동 실행 ──────────────
  # self-contained 단일 exe 퍼블리시 → (인증서 secret 있으면) 서명 → 아티팩트 업로드.
  # 시크릿: SIGN_PFX_BASE64(PFX를 base64), SIGN_PFX_PASSWORD. 없으면 미서명으로 업로드.
  publish:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      PFX_B64: ${{ secrets.SIGN_PFX_BASE64 }}
      PFX_PW: ${{ secrets.SIGN_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Guard — 윈도우 솔루션 존재 확인
        shell: pwsh
        run: |
          if (-not (Test-Path 'Cluxo.Windows.sln')) {
            Write-Host '::notice::Cluxo.Windows.sln 없음 — 스킵.'
            exit 0
          }

      - name: Publish (self-contained 단일 exe, win-x64)
        if: hashFiles('Cluxo.Windows.sln') != ''
        shell: pwsh
        run: pwsh scripts/publish.ps1 -Rid win-x64

      - name: Code sign (인증서 secret 있을 때만; windows-latest엔 signtool 내장)
        if: env.PFX_B64 != '' && hashFiles('Cluxo.Windows.sln') != ''
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP/cert.pfx", [Convert]::FromBase64String($env:PFX_B64))
          pwsh scripts/sign.ps1 -File publish/win-x64/Cluxo.Windows.App.exe -PfxPath "$env:RUNNER_TEMP/cert.pfx" -PfxPassword $env:PFX_PW
          Remove-Item "$env:RUNNER_TEMP/cert.pfx" -Force

      - name: Upload artifact
        if: hashFiles('Cluxo.Windows.sln') != ''
        uses: actions/upload-artifact@v4
        with:
          name: Cluxo-win-x64
          path: publish/win-x64/Cluxo.Windows.App.exe

      # ── 남은 T9: MSIX/.wapproj 패키징(직접배포 우선이라 후순위), EV 토큰 서명(HSM) ──
